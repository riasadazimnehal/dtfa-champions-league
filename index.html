<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dhaka Turf Football Association</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  height:100vh;
  overflow:auto;
  color:white;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background-image:url('https://files.winsports.co/cms/2025/12/31152640/%C2%BFCual-es-el-mejor-jugador-del-mundo_-Messi-Pele-Maradona-CR7_-Chat-GPT-1.jpg');
  background-size:cover;
  background-position:center;
  filter:brightness(0.4) saturate(1.5);
  z-index:-3;
  animation:zoom 20s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

/* LIGHT */
.lights{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle, rgba(34,197,94,0.25) 0%, transparent 60%);
  animation:moveLights 6s infinite alternate;
  z-index:-2;
}

@keyframes moveLights{
  0%{transform:translateX(-40px) translateY(-20px);}
  100%{transform:translateX(40px) translateY(20px);}
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(180deg,rgba(0,0,0,0.3),rgba(0,0,0,0.85));
  z-index:-1;
}

/* CONTAINER */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* LOGO */
.logo-img{
  width:140px;
  margin-bottom:10px;
  filter:drop-shadow(0 0 15px #22c55e);
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0px);}
}

.logo{
  font-size:70px;
  font-weight:bold;
  color:#22c55e;
  letter-spacing:4px;
  text-shadow:0 0 25px rgba(34,197,94,0.9);
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:15px 35px;
  background:#22c55e;
  color:white;
  text-decoration:none;
  border-radius:12px;
  font-size:18px;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  background:#16a34a;
}

/* CLUB SECTION */
.clubs-section{
  margin-top:50px;
  width:100%;
  max-width:900px;
}

.clubs-section h3{
  margin-bottom:15px;
  color:#22c55e;
  text-shadow:0 0 10px rgba(34,197,94,.6);
}

.clubs-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.club-card{
  width:140px;
  padding:12px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:12px;
  text-align:center;
  backdrop-filter:blur(6px);
  transition:0.3s;
}

.club-card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 15px rgba(34,197,94,0.4);
}

.club-card img{
  width:70px;
  height:70px;
  object-fit:contain;
  margin-bottom:8px;
}

.club-card span{
  font-size:13px;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="bg"></div>
<div class="lights"></div>
<div class="overlay"></div>

<div class="container">

  <img src="logo.png" class="logo-img">

  <div class="logo">DTFA</div>

  <p>DHAKA TURF FOOTBALL ASSOCIATION</p>

  <a class="btn" href="visit.html">ENTER</a>

  <!-- CLUBS SECTION -->
  <div class="clubs-section">
    <h3>Registered Clubs</h3>
    <div id="clubsContainer" class="clubs-grid"></div>
  </div>

</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR9GnfdalYzK2Kzy4rbVvcOwuceakjVrlYdmK6NB8Nwz3zxfua1vMgjNkE3zaEB7VzHVzyWexhvTYNM/pub?output=csv";

async function loadClubs(){
  try{
    const res = await fetch(SHEET_URL);
    const data = await res.text();

    const rows = data.split("\n").slice(1);
    const container = document.getElementById("clubsContainer");

    rows.forEach(row=>{
      const cols = row.split(",");

      const clubName = cols[2];
      const logoRaw = cols[12];

      if(!clubName) return;

      let logo = logoRaw;

      if(logo && logo.includes("drive.google.com")){
        const match = logo.match(/[-\w]{25,}/);
        if(match){
          logo = `https://drive.google.com/thumbnail?id=${match[0]}&sz=w300`;
        }
      }

      const card = document.createElement("div");
      card.className = "club-card";

      card.innerHTML = `
        <img src="${logo || 'logo.png'}">
        <span>${clubName}</span>
      `;

      container.appendChild(card);
    });

  }catch(err){
    console.log("Error loading clubs:", err);
  }
}

loadClubs();
</script>

</body>
</html>
