<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Champions League</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

/* STADIUM BACKGROUND */
body{
  height:100vh;
  overflow:hidden;
  color:white;
}

/* stadium image background */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2') center/cover no-repeat;
  filter:brightness(0.35);
  z-index:-2;
}

/* dark overlay */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(180deg,rgba(0,0,0,0.4),rgba(0,0,0,0.8));
  z-index:-1;
}

/* CENTER CONTENT */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* LOGO ANIMATION */
.logo{
  font-size:80px;
  font-weight:bold;
  letter-spacing:4px;
  color:#22c55e;
  text-shadow:0 0 20px rgba(34,197,94,0.8);
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{transform:scale(1); text-shadow:0 0 10px #22c55e;}
  to{transform:scale(1.05); text-shadow:0 0 30px #22c55e;}
}

/* TITLE */
h2{
  margin-top:10px;
  font-size:22px;
  opacity:0.9;
  letter-spacing:2px;
}

p{
  opacity:0.7;
  margin-top:5px;
}

/* VISIT BUTTON */
.btn{
  margin-top:40px;
  padding:15px 35px;
  background:#22c55e;
  color:white;
  text-decoration:none;
  border-radius:12px;
  font-size:18px;
  transition:0.3s;
  box-shadow:0 0 15px rgba(34,197,94,0.4);
}

.btn:hover{
  transform:scale(1.1);
  background:#16a34a;
}

/* floating lights */
.light{
  position:absolute;
  width:10px;
  height:10px;
  background:#22c55e;
  border-radius:50%;
  box-shadow:0 0 20px #22c55e;
  animation:float 6s infinite linear;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-120px);}
  100%{transform:translateY(0);}
}
</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- floating lights -->
<div class="light" style="top:20%; left:10%;"></div>
<div class="light" style="top:60%; left:80%;"></div>
<div class="light" style="top:40%; left:50%;"></div>

<div class="container">

  <div class="logo">🏆 DTFA</div>

  <h2>Dhaka Turf Football Association</h2>

  <a class="btn" href="visit.html">ENTER</a>

</div>

</body>
</html>
