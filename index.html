<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Champions League</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  height:100vh;
  overflow:hidden;
  color:white;
}

/* STADIUM BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2') center/cover no-repeat;
  filter:brightness(0.35);
  z-index:-2;
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(180deg,rgba(0,0,0,0.4),rgba(0,0,0,0.85));
  z-index:-1;
}

/* CENTER */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* LOGO ANIMATION */
.logo{
  font-size:70px;
  font-weight:bold;
  color:#22c55e;
  letter-spacing:4px;
  text-shadow:0 0 20px rgba(34,197,94,0.8);
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{transform:scale(1); text-shadow:0 0 10px #22c55e;}
  to{transform:scale(1.05); text-shadow:0 0 30px #22c55e;}
}

/* SUB TEXT */
h2{
  margin-top:10px;
  font-size:22px;
  letter-spacing:2px;
}

p{
  opacity:0.7;
  margin-top:5px;
}

/* BUTTON */
.btn{
  margin-top:40px;
  padding:15px 35px;
  background:#22c55e;
  color:white;
  text-decoration:none;
  border-radius:12px;
  font-size:18px;
  transition:0.3s;
  box-shadow:0 0 15px rgba(34,197,94,0.4);
}

.btn:hover{
  transform:scale(1.1);
  background:#16a34a;
}

/* LOGO IMAGE */
.logo-img{
  width:130px;
  margin-bottom:10px;
  filter:drop-shadow(0 0 10px #22c55e);
}
</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

  <!-- LOGO IMAGE (UPLOAD logo.png IN GITHUB) -->
  <img src="logo.jpg" class="logo-img">

  <div class="logo">DTFA</div>

  <h2>CHAMPIONS LEAGUE</h2>

  <p>DHAKA TURF FOOTBALL ASSOCIATION</p>

  <a class="btn" href="visit.html">ENTER</a>

</div>

</body>
</html>
