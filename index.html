<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Champions League</title>
<link rel="stylesheet" href="style.css">

<style>
/* FULL SCREEN BACKGROUND */
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* ANIMATED BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0b3d2e, #111827);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
  z-index: -1;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* CENTER CONTENT */
.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* LOGO */
.logo {
  font-size: 80px;
  font-weight: bold;
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(34,197,94,0.8);
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {text-shadow: 0 0 10px #22c55e;}
  to {text-shadow: 0 0 30px #22c55e;}
}

/* TITLE */
h2 {
  margin-top: 10px;
  font-size: 22px;
  opacity: 0.9;
}

/* SUB TEXT */
p {
  opacity: 0.7;
}

/* BUTTON */
.visit-btn {
  margin-top: 40px;
  padding: 15px 30px;
  background: #22c55e;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  font-size: 18px;
  transition: 0.3s;
}

.visit-btn:hover {
  transform: scale(1.1);
  background: #16a34a;
}

/* FLOAT BALL EFFECT */
.ball {
  position: absolute;
  width: 60px;
  height: 60px;
  background: url('https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg');
  background-size: cover;
  opacity: 0.2;
  animation: float 8s infinite linear;
}

@keyframes float {
  0% {transform: translateY(0px) rotate(0deg);}
  50% {transform: translateY(-100px) rotate(180deg);}
  100% {transform: translateY(0px) rotate(360deg);}
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- floating balls -->
<div class="ball" style="top:10%; left:20%;"></div>
<div class="ball" style="top:60%; left:70%;"></div>
<div class="ball" style="top:30%; left:80%;"></div>

<div class="container">

  <div class="logo">🏆 DTFA</div>
  <h2>DHAKA TURF FOOTBALL ASSOCIATION</h2>
  <p>Welcome to Champions League</p>

  <a class="visit-btn" href="visit.html">VISIT</a>

</div>

</body>
</html>
