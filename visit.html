<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Menu</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
  text-align:center;
}

/* HEADER */
h1{
  margin-top:40px;
}

/* MENU GRID */
.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  width:80%;
  margin:50px auto;
}

/* BUTTON CARD */
.card{
  padding:25px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:rgba(34,197,94,0.15);
}

/* LINK */
a{
  color:white;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
}
</style>

</head>

<body>

<h1>⚽ DTFA DASHBOARD</h1>

<div class="menu">

  <div class="card">
    <a href="tournaments.html">🏆 Tournaments</a>
  </div>

  <div class="card">
    <a href="matches.html">📅 Match Schedule & Results</a>
  </div>

  <div class="card">
    <a href="points.html">📊 Point Table</a>
  </div>

  <div class="card">
    <a href="about.html">ℹ️ About Us</a>
  </div>

</div>

</body>
</html>
