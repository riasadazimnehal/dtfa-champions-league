<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat', sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  color:white;
  background:radial-gradient(circle at top,#0f172a,#000);
}

/* STADIUM LIGHT EFFECT */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 30%,rgba(34,197,94,0.15),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(59,130,246,0.12),transparent 40%);
  animation:moveBg 6s infinite alternate;
}

@keyframes moveBg{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

/* CENTER BOX */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;
}

/* TITLE */
.title{
  font-size:38px;
  font-weight:800;
  letter-spacing:2px;
  text-shadow:0 0 20px rgba(255,255,255,0.3);
}

.subtitle{
  opacity:0.7;
  margin-top:10px;
}

/* BUTTON GRID */
.grid{
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* CARD BUTTON */
.card{
  padding:25px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  cursor:pointer;
  transition:0.4s;
  text-decoration:none;
  color:white;
  position:relative;
  overflow:hidden;
}

/* HOVER */
.card:hover{
  transform:translateY(-10px) scale(1.05);
  border:1px solid rgba(34,197,94,0.5);
  box-shadow:0 0 30px rgba(34,197,94,0.25);
}

/* GLOW LINE */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.15),transparent);
  transition:0.5s;
}

.card:hover::before{
  left:100%;
}

/* ICON */
.icon{
  font-size:28px;
  margin-bottom:10px;
}

/* TEXT */
.text{
  font-size:16px;
  font-weight:700;
}

/* SUB */
.sub{
  font-size:12px;
  opacity:0.6;
  margin-top:5px;
}
</style>

</head>

<body>

<div class="center">

  <div class="title">🏆 DTFA FOOTBALL HUB</div>
  <div class="subtitle">Welcome to Dhaka Turf Football Association</div>

  <div class="grid">

    <a class="card" href="champions.html">
      <div class="icon">🏆</div>
      <div class="text">Tournaments</div>
      <div class="sub">Champions League & More</div>
    </a>

    <a class="card" href="matches.html">
      <div class="icon">⚽</div>
      <div class="text">Match Schedule</div>
      <div class="sub">Live & Upcoming Games</div>
    </a>

    <a class="card" href="table.html">
      <div class="icon">📊</div>
      <div class="text">Point Table</div>
      <div class="sub">Team Rankings</div>
    </a>

    <a class="card" href="about.html">
      <div class="icon">ℹ️</div>
      <div class="text">About Us</div>
      <div class="sub">Community Info</div>
    </a>

  </div>

</div>

</body>
</html>
