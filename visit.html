<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat', sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1220;
}

/* STADIUM STYLE BACKGROUND */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1518091043644-c1d4457512c6") center/cover;
  opacity:0.18;
  filter:blur(2px);
}

/* DARK OVERLAY */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, rgba(0,0,0,0.4), rgba(0,0,0,0.9));
}

/* MAIN PANEL */
.panel{
  position:relative;
  z-index:2;
  width:380px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo{
  width:90px;
  height:90px;
  border-radius:50%;
  margin:auto;
  overflow:hidden;
  border:2px solid white;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.logo img{
  width:100%;
}

/* TITLE */
h1{
  margin-top:15px;
  font-size:28px;
  color:white;
  letter-spacing:2px;
}

p{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}

/* BUTTON GRID */
.grid{
  margin-top:25px;
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

/* BUTTON STYLE */
.btn{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  border-radius:14px;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  transition:0.3s;
  font-weight:600;
}

.btn:hover{
  transform:scale(1.05);
  background:rgba(34,197,94,0.15);
  box-shadow:0 0 20px rgba(34,197,94,0.25);
}

/* ICON STYLE */
.icon{
  font-size:18px;
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:11px;
  opacity:0.5;
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="panel">

  <div class="logo">
    <img src="logo.png">
  </div>

  <h1>DTFA</h1>
  <p>Dhaka Turf Football Association</p>

  <div class="grid">

    <a class="btn" href="tournaments.html">
      <span>🏆 Tournaments</span>
      <span class="icon">→</span>
    </a>

    <a class="btn" href="matches.html">
      <span>📅 Match Schedule</span>
      <span class="icon">→</span>
    </a>

    <a class="btn" href="points.html">
      <span>📊 Point Table</span>
      <span class="icon">→</span>
    </a>

    <a class="btn" href="about.html">
      <span>ℹ️ About Us</span>
      <span class="icon">→</span>
    </a>

  </div>

  <div class="footer">
    © DTFA • Football League System
  </div>

</div>

</body>
</html>
