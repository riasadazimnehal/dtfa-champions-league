<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTFA Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    linear-gradient(
        rgba(0,0,0,0.65),
        rgba(0,0,0,0.80)
    ),
    url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=1920&q=80');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* Animated Lights */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at 20% 20%,rgba(0,255,128,.12),transparent 30%),
    radial-gradient(circle at 80% 30%,rgba(0,140,255,.12),transparent 30%),
    radial-gradient(circle at 50% 90%,rgba(255,255,255,.05),transparent 40%);

    animation:lights 8s ease-in-out infinite alternate;
}

@keyframes lights{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.15);
    }
}

/* Main Container */

.container{
    position:relative;
    z-index:10;
    width:90%;
    max-width:1200px;
    text-align:center;
}

/* Logo */

.logo{
    width:140px;
    height:140px;
    margin:auto;
    margin-bottom:20px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid rgba(255,255,255,.8);
    box-shadow:0 0 40px rgba(255,255,255,.25);

    animation:floatLogo 4s ease-in-out infinite;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes floatLogo{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* Title */

.title{
    font-size:48px;
    font-weight:800;
    color:white;
    letter-spacing:3px;
    text-shadow:0 0 25px rgba(255,255,255,.3);
}

.subtitle{
    color:rgba(255,255,255,.8);
    margin-top:10px;
    margin-bottom:40px;
    font-size:14px;
}

/* Menu Grid */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:25px;
}

/* Cards */

.card{
    text-decoration:none;
    color:white;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);

    backdrop-filter:blur(15px);

    border-radius:20px;
    padding:30px;

    transition:.4s;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);

    border-color:#22c55e;

    box-shadow:
    0 0 30px rgba(34,197,94,.25),
    0 0 60px rgba(34,197,94,.15);
}

.card::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:100%;
    height:100%;

    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.15),
        transparent
    );

    transition:.6s;
}

.card:hover::before{
    left:120%;
}

.icon{
    font-size:40px;
    margin-bottom:15px;
}

.card-title{
    font-size:18px;
    font-weight:700;
}

.card-sub{
    margin-top:8px;
    font-size:12px;
    opacity:.7;
}

@media(max-width:768px){

.title{
    font-size:34px;
}

.logo{
    width:110px;
    height:110px;
}

}

</style>
</head>

<body>

<div class="container">

    <!-- DTFA Logo -->
    <div class="logo">
        <img src="logo.png" alt="DTFA Logo">
    </div>

    <div class="title">DTFA FOOTBALL HUB</div>

    <div class="subtitle">
        DHAKA TURF FOOTBALL ASSOCIATION
    </div>

    <div class="grid">

        <a href="tournaments.html" class="card">
            <div class="icon">🏆</div>
            <div class="card-title">Tournaments</div>
            <div class="card-sub">Champions League & More</div>
        </a>

        <a href="matches.html" class="card">
            <div class="icon">⚽</div>
            <div class="card-title">Match Schedule</div>
            <div class="card-sub">Live & Upcoming Matches</div>
        </a>

        <a href="table.html" class="card">
            <div class="icon">📊</div>
            <div class="card-title">Point Table</div>
            <div class="card-sub">League Standings</div>
        </a>

        <a href="about.html" class="card">
            <div class="icon">ℹ️</div>
            <div class="card-title">About Us</div>
            <div class="card-sub">Community & Management</div>
        </a>

    </div>

</div>

</body>
</html>
