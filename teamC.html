<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team C Players</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  min-height:100vh;
  color:white;
  font-family:'Montserrat',sans-serif;

  background:
  linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.92)),
  url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=1920&q=80');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;

  background:
  radial-gradient(circle at 20% 20%, rgba(34,197,94,0.15), transparent 35%),
  radial-gradient(circle at 80% 30%, rgba(59,130,246,0.15), transparent 35%);

  animation:move 8s infinite alternate;
}

@keyframes move{
  from{transform:scale(1);}
  to{transform:scale(1.12);}
}

.header{
  text-align:center;
  padding:50px 10px 20px;
}

.header h1{
  font-size:40px;
  font-weight:900;
}

.container{
  width:90%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.player-card{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:22px;
  padding:20px;
  text-align:center;
  backdrop-filter:blur(15px);
  transition:0.4s;
}

.player-card:hover{
  transform:translateY(-10px) scale(1.05);
  border-color:#22c55e;
  box-shadow:0 0 40px rgba(34,197,94,0.25);
}

.player-img{
  width:100px;
  height:100px;
  margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(255,255,255,0.25);
  animation:float 4s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

.name{margin-top:12px;font-weight:800;}
.info{font-size:12px;opacity:0.7;}

.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.6;
  text-decoration:none;
}
.back:hover{opacity:1;}

</style>
</head>

<body>

<div class="header">
  <h1>TEAM C PLAYERS</h1>
</div>

<div class="container">

<div class="player-card"><div class="player-img"><img src="https://i.pravatar.cc/150?img=21"></div><div class="name">Player 1</div><div class="info">Age 21 | ST</div></div>
<div class="player-card"><div class="player-img"><img src="https://i.pravatar.cc/150?img=22"></div><div class="name">Player 2</div><div class="info">Age 22 | CM</div></div>
<div class="player-card"><div class="player-img"><img src="https://i.pravatar.cc/150?img=23"></div><div class="name">Player 3</div><div class="info">Age 24 | CB</div></div>
<div class="player-card"><div class="player-img"><img src="https://i.pravatar.cc/150?img=24"></div><div class="name">Player 4</div><div class="info">Age 20 | GK</div></div>
<div class="player-card"><div class="player-img"><img src="https://i.pravatar.cc/150?img=25"></div><div class="name">Player 5</div><div class="info">Age 23 | LW</div></div>
<div class="player-card"><div class="player-img"><img src="https://i.pravatar.cc/150?img=26"></div><div class="name">Player 6</div><div class="info">Age 25 | RB</div></div>
<div class="player-card"><div class="player-img"><img src="https://i.pravatar.cc/150?img=27"></div><div class="name">Player 7</div><div class="info">Age 21 | RW</div></div>
<div class="player-card"><div class="player-img"><img src="https://i.pravatar.cc/150?img=28"></div><div class="name">Player 8</div><div class="info">Age 22 | CM</div></div>
<div class="player-card"><div class="player-img"><img src="https://i.pravatar.cc/150?img=29"></div><div class="name">Player 9</div><div class="info">Age 24 | CB</div></div>
<div class="player-card"><div class="player-img"><img src="https://i.pravatar.cc/150?img=30"></div><div class="name">Player 10</div><div class="info">Age 23 | ST</div></div>

</div>

<a class="back" href="champions.html">⬅ Back</a>

</body>
</html>
