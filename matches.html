<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Match Center</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  color:white;
  min-height:100vh;

  /* CHAMPIONS LEAGUE STADIUM VIBE */
  background:
  linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.94)),
  url('https://images.unsplash.com/photo-1517466787929-bc90951d0974?auto=format&fit=crop&w=1920&q=80');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* LIGHT GLOW */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;

  background:
  radial-gradient(circle at 20% 20%, rgba(34,197,94,0.18), transparent 35%),
  radial-gradient(circle at 80% 30%, rgba(59,130,246,0.18), transparent 35%),
  radial-gradient(circle at 50% 80%, rgba(255,215,0,0.08), transparent 40%);

  animation:glow 7s infinite alternate ease-in-out;
}

@keyframes glow{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 10px 10px;
}

.header h1{
  font-size:40px;
  font-weight:900;
  letter-spacing:2px;
}

.header p{
  opacity:0.7;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:25px 0;
  flex-wrap:wrap;
}

.tab{
  padding:10px 22px;
  border-radius:25px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);

  cursor:pointer;
  transition:0.3s;
  font-weight:600;
}

.tab:hover{
  background:#22c55e;
  box-shadow:0 0 20px rgba(34,197,94,0.3);
  transform:scale(1.05);
}

/* SECTION */
.section{
  display:none;
  width:85%;
  margin:20px auto;
}

.active{
  display:block;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(14px);

  border-radius:18px;
  padding:22px;
  margin-bottom:18px;

  transition:0.4s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  border-color:#22c55e;
  box-shadow:0 0 35px rgba(34,197,94,0.2);
}

/* SHINE EFFECT */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.1),transparent);
  transition:0.8s;
}

.card:hover::before{
  left:120%;
}

/* MATCH */
.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
}

.team{
  font-weight:800;
  letter-spacing:1px;
}

.score{
  font-size:22px;
  color:#22c55e;
  font-weight:900;
}

/* BADGES */
.badge{
  display:inline-block;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  margin-bottom:10px;
  font-weight:700;
}

/* LIVE */
.live{
  background:red;
  animation:blink 1s infinite;
}

/* UPCOMING */
.upcoming{
  background:#facc15;
  color:black;
}

/* FT */
.ft{
  background:#22c55e;
  color:white;
}

@keyframes blink{
  50%{opacity:0.4;}
}

/* STATUS */
.status{
  text-align:center;
  margin-top:10px;
  font-size:13px;
  opacity:0.8;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.6;
  text-decoration:none;
}

.back:hover{
  opacity:1;
}

</style>
</head>

<body>

<div class="header">
  <h1>📅 DTFA MATCH CENTER</h1>
  <p>Live • Upcoming • Results</p>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab" onclick="show('live')">🔴 Live</div>
  <div class="tab" onclick="show('upcoming')">🟡 Upcoming</div>
  <div class="tab" onclick="show('results')">🟢 Results</div>
</div>

<!-- LIVE -->
<div id="live" class="section active">

  <div class="card">
    <div class="badge live">LIVE</div>

    <div class="match">
      <div class="team">Team A</div>
      <div class="score">1 - 0</div>
      <div class="team">Team B</div>
    </div>

    <div class="status">🔥 Match is LIVE now</div>
  </div>

</div>

<!-- UPCOMING -->
<div id="upcoming" class="section">

  <div class="card">
    <div class="badge upcoming">UPCOMING</div>

    <div class="match">
      <div class="team">Team C</div>
      <div class="score">VS</div>
      <div class="team">Team D</div>
    </div>

    <div class="status">⏰ Starts at 6:00 PM</div>
  </div>

</div>

<!-- RESULTS -->
<div id="results" class="section">

  <div class="card">
    <div class="badge ft">FT</div>

    <div class="match">
      <div class="team">Team A</div>
      <div class="score">2 - 1</div>
      <div class="team">Team B</div>
    </div>

    <div class="status">🏆 Team A Won</div>
  </div>

  <div class="card">
    <div class="badge ft">FT</div>

    <div class="match">
      <div class="team">Team C</div>
      <div class="score">1 - 1</div>
      <div class="team">Team D</div>
    </div>

    <div class="status">🤝 Draw Match</div>
  </div>

</div>

<a class="back" href="visit.html">⬅ Back to Menu</a>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
