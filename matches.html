<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Match Center</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:30px 10px;
}

.header h1{
  font-size:32px;
}

.header p{
  opacity:0.7;
}

/* TAB BUTTONS */
.tabs{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px 0;
  flex-wrap:wrap;
}

.tab{
  padding:10px 20px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  transition:0.3s;
}

.tab:hover{
  background:#22c55e;
}

/* SECTION */
.section{
  display:none;
  width:85%;
  margin:20px auto;
}

.active{
  display:block;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:15px;
  padding:20px;
  margin-bottom:15px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
  background:rgba(34,197,94,0.15);
}

/* MATCH ROW */
.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
}

.team{
  font-weight:bold;
}

.score{
  font-size:20px;
  color:#22c55e;
}

/* BADGES */
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  margin-bottom:10px;
}

.live{background:red; animation:blink 1s infinite;}
.upcoming{background:#facc15; color:black;}
.ft{background:#22c55e;}

@keyframes blink{
  50%{opacity:0.4;}
}

/* STATUS */
.status{
  text-align:center;
  margin-top:10px;
  font-size:13px;
  opacity:0.8;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.7;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="header">
  <h1>📅 DTFA MATCH CENTER</h1>
  <p>Live • Upcoming • Results</p>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab" onclick="show('live')">🔴 Live</div>
  <div class="tab" onclick="show('upcoming')">🟡 Upcoming</div>
  <div class="tab" onclick="show('results')">🟢 Results</div>
</div>

<!-- LIVE -->
<div id="live" class="section active">

  <div class="card">
    <div class="badge live">LIVE</div>

    <div class="match">
      <div class="team">Team A</div>
      <div class="score">1 - 0</div>
      <div class="team">Team B</div>
    </div>

    <div class="status">🔥 Match is LIVE now</div>
  </div>

</div>

<!-- UPCOMING -->
<div id="upcoming" class="section">

  <div class="card">
    <div class="badge upcoming">UPCOMING</div>

    <div class="match">
      <div class="team">Team C</div>
      <div class="score">VS</div>
      <div class="team">Team D</div>
    </div>

    <div class="status">⏰ Starts at 6:00 PM</div>
  </div>

</div>

<!-- RESULTS -->
<div id="results" class="section">

  <div class="card">
    <div class="badge ft">FT</div>

    <div class="match">
      <div class="team">Team A</div>
      <div class="score">2 - 1</div>
      <div class="team">Team B</div>
    </div>

    <div class="status">🏆 Team A Won</div>
  </div>

  <div class="card">
    <div class="badge ft">FT</div>

    <div class="match">
      <div class="team">Team C</div>
      <div class="score">1 - 1</div>
      <div class="team">Team D</div>
    </div>

    <div class="status">🤝 Draw Match</div>
  </div>

</div>

<a class="back" href="visit.html">⬅ Back to Menu</a>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
