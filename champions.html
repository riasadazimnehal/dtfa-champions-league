<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Champions League</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:30px 10px;
}

.header h1{
  font-size:32px;
}

.header p{
  opacity:0.7;
}

/* TEAM BUTTONS */
.teams{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
  margin:20px;
}

.team-btn{
  padding:10px 20px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  transition:0.3s;
}

.team-btn:hover{
  background:#22c55e;
}

/* PLAYER SECTION */
.players{
  display:none;
  width:90%;
  margin:30px auto;
}

.active{
  display:block;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:15px;
  padding:20px;
  text-align:center;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:rgba(34,197,94,0.15);
}

/* AVATAR */
.avatar{
  width:70px;
  height:70px;
  border-radius:50%;
  overflow:hidden;
  margin:auto;
  border:2px solid #22c55e;
}

.avatar img{
  width:100%;
  height:100%;
}

/* INFO */
.name{
  margin-top:10px;
  font-weight:bold;
}

.info{
  font-size:14px;
  opacity:0.8;
  margin-top:5px;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.7;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="header">
  <h1>🏆 DTFA CHAMPIONS LEAGUE</h1>
  <p>4 Teams • 10 Players Each</p>
</div>

<!-- TEAMS -->
<div class="teams">
  <div class="team-btn" onclick="show('A')">Team A</div>
  <div class="team-btn" onclick="show('B')">Team B</div>
  <div class="team-btn" onclick="show('C')">Team C</div>
  <div class="team-btn" onclick="show('D')">Team D</div>
</div>

<!-- TEAM A -->
<div id="A" class="players active">
  <div class="grid">
    <script>
      document.write(generateTeam("A",1,10));
    </script>
  </div>
</div>

<!-- TEAM B -->
<div id="B" class="players">
  <div class="grid">
    <script>
      document.write(generateTeam("B",11,20));
    </script>
  </div>
</div>

<!-- TEAM C -->
<div id="C" class="players">
  <div class="grid">
    <script>
      document.write(generateTeam("C",21,30));
    </script>
  </div>
</div>

<!-- TEAM D -->
<div id="D" class="players">
  <div class="grid">
    <script>
      document.write(generateTeam("D",31,40));
    </script>
  </div>
</div>

<a class="back" href="visit.html">⬅ Back to Menu</a>

<script>
function show(team){
  document.querySelectorAll('.players').forEach(p=>{
    p.classList.remove('active');
  });
  document.getElementById(team).classList.add('active');
}

/* AUTO GENERATE 10 PLAYERS PER TEAM */
function generateTeam(letter,start,end){
  let html = "";
  let positions = ["Forward","Midfielder","Defender","Goalkeeper"];

  for(let i=start;i<=end;i++){
    html += `
      <div class="card">
        <div class="avatar">
          <img src="https://i.pravatar.cc/100?img=${i}">
        </div>
        <div class="name">Player ${letter}${i-start+1}</div>
        <div class="info">
          Age: ${20 + (i % 7)} | Position: ${positions[i % 4]}
        </div>
      </div>
    `;
  }
  return html;
}
</script>

</body>
</html>
