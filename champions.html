<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Champions League</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 10px;
}

.header h1{
  font-size:34px;
  letter-spacing:2px;
}

.header p{
  opacity:0.7;
}

/* GRID */
.container{
  width:90%;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

/* TEAM CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:18px;
  padding:25px;
  text-align:center;
  cursor:pointer;
  transition:0.4s;
  backdrop-filter:blur(10px);
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  background:rgba(34,197,94,0.15);
  box-shadow:0 0 25px rgba(34,197,94,0.3);
}

/* LOGO */
.logo{
  width:80px;
  height:80px;
  border-radius:50%;
  margin:auto;
  overflow:hidden;
  border:2px solid #22c55e;
  animation:float 3s ease-in-out infinite;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

/* NAME */
.name{
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
  letter-spacing:1px;
}

/* BUTTON STYLE TEXT */
.open{
  margin-top:10px;
  font-size:12px;
  opacity:0.7;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.7;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="header">
  <h1>🏆 DTFA CHAMPIONS LEAGUE</h1>
  <p>Select Your Team</p>
</div>

<div class="container">

  <a href="teamA.html" class="card">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=11"></div>
    <div class="name">TEAM A</div>
    <div class="open">Click to view players</div>
  </a>

  <a href="teamB.html" class="card">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=12"></div>
    <div class="name">TEAM B</div>
    <div class="open">Click to view players</div>
  </a>

  <a href="teamC.html" class="card">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=13"></div>
    <div class="name">TEAM C</div>
    <div class="open">Click to view players</div>
  </a>

  <a href="teamD.html" class="card">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=14"></div>
    <div class="name">TEAM D</div>
    <div class="open">Click to view players</div>
  </a>

</div>

<a class="back" href="visit.html">⬅ Back to Menu</a>

</body>
</html>
