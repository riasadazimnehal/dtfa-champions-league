<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Champions League</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat', sans-serif;
}

body{
  min-height:100vh;
  color:white;

  /* STADIUM CINEMATIC BG */
  background:
  linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.92)),
  url('https://images.unsplash.com/photo-1517466787929-bc90951d0974?auto=format&fit=crop&w=1920&q=80');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  overflow-x:hidden;
}

/* LIGHT EFFECTS */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;

  background:
  radial-gradient(circle at 15% 20%, rgba(34,197,94,0.18), transparent 35%),
  radial-gradient(circle at 85% 25%, rgba(59,130,246,0.18), transparent 35%),
  radial-gradient(circle at 50% 90%, rgba(255,215,0,0.08), transparent 45%);

  animation:lights 7s infinite alternate ease-in-out;
}

@keyframes lights{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

/* HEADER */
.header{
  text-align:center;
  padding:50px 10px 20px;
}

.header h1{
  font-size:42px;
  letter-spacing:3px;
  font-weight:900;
  text-shadow:0 0 20px rgba(255,255,255,0.2);
}

.header p{
  opacity:0.75;
  margin-top:8px;
}

/* GRID */
.container{
  width:90%;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:28px;
}

/* TEAM CARD */
.team-btn{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:22px;
  padding:30px;
  text-align:center;
  cursor:pointer;
  transition:0.4s;
  text-decoration:none;
  position:relative;
  overflow:hidden;
  backdrop-filter:blur(14px);
}

/* HOVER */
.team-btn:hover{
  transform:translateY(-12px) scale(1.05);
  border:1px solid rgba(34,197,94,0.5);
  box-shadow:
    0 0 30px rgba(34,197,94,0.25),
    0 0 60px rgba(34,197,94,0.12);
}

/* SHINE */
.team-btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.15),transparent);
  transition:0.7s;
}

.team-btn:hover::before{
  left:120%;
}

/* LOGO */
.logo{
  width:95px;
  height:95px;
  border-radius:50%;
  margin:auto;
  overflow:hidden;
  border:3px solid rgba(255,255,255,0.35);

  animation:floatLogo 4s ease-in-out infinite;
  box-shadow:0 0 25px rgba(255,255,255,0.15);
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FLOAT ANIMATION */
@keyframes floatLogo{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

/* TEAM NAME */
.name{
  margin-top:16px;
  font-size:18px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  color:white;
  text-shadow:0 0 18px rgba(255,255,255,0.25);
}

/* SUB */
.sub{
  font-size:12px;
  opacity:0.7;
  margin-top:6px;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:35px;
  color:white;
  opacity:0.6;
  text-decoration:none;
  transition:0.3s;
}

.back:hover{
  opacity:1;
}

/* MOBILE */
@media(max-width:768px){
  .header h1{
    font-size:30px;
  }
}

</style>
</head>

<body>

<div class="header">
  <h1>🏆 DTFA CHAMPIONS LEAGUE</h1>
  <p>Select Your Team</p>
</div>

<div class="container">

  <a href="teamA.html" class="team-btn">
    <div class="logo"><img src="inc.jpg"></div>
    <div class="name">INCOGNITO FC</div>
    <div class="sub">View Players</div>
  </a>

  <a href="teamB.html" class="team-btn">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=12"></div>
    <div class="name">Team B</div>
    <div class="sub">View Players</div>
  </a>

  <a href="teamC.html" class="team-btn">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=13"></div>
    <div class="name">Team C</div>
    <div class="sub">View Players</div>
  </a>

  <a href="teamD.html" class="team-btn">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=14"></div>
    <div class="name">Team D</div>
    <div class="sub">View Players</div>
  </a>

</div>

<a class="back" href="visit.html">⬅ Back to Dashboard</a>

</body>
</html>
