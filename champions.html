<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Champions League</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat', sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 10px;
}

.header h1{
  font-size:34px;
  letter-spacing:2px;
}

.header p{
  opacity:0.7;
  margin-top:5px;
}

/* TEAM GRID */
.container{
  width:90%;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

/* TEAM CARD */
.team-btn{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:18px;
  padding:25px;
  text-align:center;
  cursor:pointer;
  transition:0.4s;
  position:relative;
  overflow:hidden;
  animation:float 3s ease-in-out infinite;
  text-decoration:none;
}

/* FLOAT ANIMATION */
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
  100%{transform:translateY(0);}
}

/* HOVER */
.team-btn:hover{
  transform:translateY(-10px) scale(1.08);
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.35);
  box-shadow:0 0 30px rgba(255,255,255,0.15);
}

/* LOGO */
.logo{
  width:85px;
  height:85px;
  border-radius:50%;
  margin:auto;
  overflow:hidden;
  border:2px solid #fff;
  animation:spinGlow 4s linear infinite;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOGO ANIMATION */
@keyframes spinGlow{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* TEAM NAME */
.name{
  margin-top:15px;
  font-size:17px;
  font-weight:800;
  color:#ffffff;
  letter-spacing:2px;
  text-transform:uppercase;
  text-shadow:0 0 10px rgba(255,255,255,0.15);
}

/* SUB TEXT */
.sub{
  margin-top:8px;
  font-size:12px;
  opacity:0.7;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.6;
  text-decoration:none;
}
.back:hover{
  opacity:1;
}
</style>

</head>

<body>

<div class="header">
  <h1>🏆 DTFA CHAMPIONS LEAGUE</h1>
  <p>Select Your Team</p>
</div>

<div class="container">

  <a href="teamA.html" class="team-btn">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=11"></div>
    <div class="name">Team A</div>
    <div class="sub">Click to view players</div>
  </a>

  <a href="teamB.html" class="team-btn">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=12"></div>
    <div class="name">Team B</div>
    <div class="sub">Click to view players</div>
  </a>

  <a href="teamC.html" class="team-btn">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=13"></div>
    <div class="name">Team C</div>
    <div class="sub">Click to view players</div>
  </a>

  <a href="teamD.html" class="team-btn">
    <div class="logo"><img src="https://i.pravatar.cc/100?img=14"></div>
    <div class="name">Team D</div>
    <div class="sub">Click to view players</div>
  </a>

</div>

<a class="back" href="visit.html">⬅ Back to Menu</a>

</body>
</html>
