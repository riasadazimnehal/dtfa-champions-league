<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTFA Hall Of Fame</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* background same vibe */
body{
margin:0;
font-family:Montserrat;
color:white;

background:
linear-gradient(rgba(0,0,0,.88),rgba(0,0,0,.95)),
url('https://images.unsplash.com/photo-1522778034537-20a2486be803?auto=format&fit=crop&w=1920&q=80');

background-size:cover;
background-attachment:fixed;
}

/* HEADER */
.header{
text-align:center;
padding:40px;
}

.header h1{
font-size:50px;
font-weight:900;
background:linear-gradient(90deg,#fff,#facc15,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* CONTAINER */
.container{
width:90%;
margin:auto;
}

/* CARD */
.card{
display:flex;
gap:20px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
margin-bottom:20px;
transition:.3s;
border:1px solid rgba(255,255,255,.1);
}

.card:hover{
transform:scale(1.02);
border-color:#facc15;
}

/* IMAGE */
.card img{
width:160px;
height:160px;
object-fit:cover;
border-radius:15px;
border:2px solid gold;
}

/* INFO */
.info h2{
margin:0;
font-size:26px;
}

.info h3{
margin:5px 0;
opacity:.8;
}

.badge{
display:inline-block;
padding:5px 10px;
background:gold;
color:black;
border-radius:20px;
font-weight:700;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">
<h1>🏛️ DTFA HALL OF FAME</h1>
</div>

<div class="container">
  <div class="card">

<img src="https://via.placeholder.com/200">

<div class="info">

<div class="badge">🏆 MVP 2026</div>

<h2>Nehal</h2>
<h3>Incognito FC</h3>

<p>⚽ Best Forward</p>
<p>🔥 14 Goals</p>

</div>

</div>
