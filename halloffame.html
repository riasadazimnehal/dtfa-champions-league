<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTFA Hall Of Fame</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat;
}

body{

color:white;
overflow-x:hidden;

/* 🌟 CINEMATIC FIFA BACKGROUND */
background:
radial-gradient(circle at 20% 20%, rgba(255,215,0,.10), transparent 35%),
radial-gradient(circle at 80% 30%, rgba(34,197,94,.10), transparent 40%),
radial-gradient(circle at 50% 90%, rgba(59,130,246,.10), transparent 40%),

linear-gradient(rgba(0,0,0,.92),rgba(0,0,0,.97)),

url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=1920&q=80');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* subtle noise overlay */
body::before{
content:"";
position:fixed;
inset:0;
background:url('https://www.transparenttextures.com/patterns/dark-mosaic.png');
opacity:.12;
pointer-events:none;
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
}

.header h1{
font-size:52px;
font-weight:900;
letter-spacing:2px;

background:linear-gradient(90deg,#fff,#facc15,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
opacity:.8;
margin-top:8px;
}

/* SCROLL AREA */

.container{
width:92%;
margin:auto;
padding-bottom:60px;
}

/* CARD */

.card{
display:flex;
height:340px;
margin-bottom:25px;

border-radius:22px;
overflow:hidden;

background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.12);

transition:.4s;
}

.card:hover{
transform:scale(1.02);
border-color:#facc15;
box-shadow:0 0 40px rgba(255,215,0,.15);
}

/* LEFT IMAGE */

.left{
flex:1;
min-width:340px;
overflow:hidden;
position:relative;
}

.left img{
width:100%;
height:100%;
object-fit:cover;
transform:scale(1.1);
transition:.6s;
}

.card:hover .left img{
transform:scale(1.2);
}

/* GOLD FRAME */

.left::after{
content:"";
position:absolute;
inset:0;
border:2px solid rgba(255,215,0,.35);
box-shadow:inset 0 0 25px rgba(255,215,0,.25);
pointer-events:none;
}

/* RIGHT SIDE */

.right{
flex:1;
padding:25px;
display:flex;
flex-direction:column;
justify-content:center;
gap:12px;
}

/* BADGE */

.badge{
display:inline-block;
padding:6px 14px;
background:linear-gradient(90deg,#facc15,#ffb300);
color:black;
font-weight:900;
border-radius:25px;
width:max-content;
font-size:12px;
box-shadow:0 0 15px rgba(255,215,0,.3);
}

/* NAME */

.right h2{
font-size:32px;
font-weight:900;
}

.right h3{
opacity:.8;
}

/* STATS */

.stats{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.stat{
padding:8px 12px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
border-radius:10px;
font-size:13px;
}

/* TROPHY */

.trophy{
position:absolute;
top:15px;
right:15px;
font-size:28px;
animation:float 2.5s infinite ease-in-out;
}

@keyframes float{
50%{transform:translateY(-6px);}
}

/* MOBILE */

@media(max-width:768px){

.card{
flex-direction:column;
height:auto;
}

.left{
height:260px;
}

.header h1{
font-size:32px;
}

}

</style>
</head>

<body>

<div class="header">
<h1>🏛️ DTFA HALL OF FAME</h1>
<div class="sub">Where Legends Never Retire</div>
</div>

<div class="container">

<!-- PLAYER 1 -->
<div class="card">

<div class="left">
<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=800&q=80">
</div>

<div class="right">

<div class="badge">🏆 MVP SEASON 2026</div>

<h2>Nehal</h2>
<h3>Incognito FC</h3>

<div class="stats">
<div class="stat">⚽ 14 Goals</div>
<div class="stat">🎯 Best Forward</div>
<div class="stat">🔥 Tournament Star</div>
</div>

</div>

<div class="trophy">🏆</div>

</div>

<!-- PLAYER 2 -->
<div class="card">

<div class="left">
<img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=800&q=80">
</div>

<div class="right">

<div class="badge">🧤 GOLDEN GLOVE</div>

<h2>Tonmoy</h2>
<h3>Defenders United</h3>

<div class="stats">
<div class="stat">🧤 8 Clean Sheets</div>
<div class="stat">🛡 Best Defender</div>
<div class="stat">👑 Captain</div>
</div>

</div>

<div class="trophy">👑</div>

</div>

</div>

</body>
</html>
