<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team A Players</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

.header{
  text-align:center;
  padding:30px;
}

.container{
  width:90%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

/* PLAYER CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:15px;
  padding:20px;
  text-align:center;
  transition:0.3s;
  backdrop-filter:blur(10px);
}

.card:hover{
  transform:scale(1.05);
  background:rgba(34,197,94,0.15);
}

.avatar{
  width:70px;
  height:70px;
  border-radius:50%;
  margin:auto;
  overflow:hidden;
  border:2px solid #22c55e;
}

.avatar img{
  width:100%;
}

.name{
  margin-top:10px;
  font-weight:bold;
}

.info{
  font-size:14px;
  opacity:0.8;
  margin-top:5px;
}

.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.7;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="header">
  <h1>⚽ TEAM A PLAYERS</h1>
</div>

<div class="container">

  <div class="card">
    <div class="avatar"><img src="https://i.pravatar.cc/100?img=1"></div>
    <div class="name">Player A1</div>
    <div class="info">Age: 22 | Forward</div>
  </div>

  <div class="card">
    <div class="avatar"><img src="https://i.pravatar.cc/100?img=2"></div>
    <div class="name">Player A2</div>
    <div class="info">Age: 23 | Midfielder</div>
  </div>

  <!-- COPY SAME STYLE FOR 10 PLAYERS -->

</div>

<a class="back" href="champions.html">⬅ Back</a>

</body>
</html>
