<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INCOGNITO FC</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

.header{
  text-align:center;
  padding:30px;
}

.header h1{
  font-size:32px;
  font-weight:800;
}

.container{
  width:92%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
}

/* PLAYER CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:22px;
  padding:28px;
  text-align:center;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-12px) scale(1.05);
  background:rgba(34,197,94,0.12);
  box-shadow:0 0 35px rgba(34,197,94,0.30);
}

.avatar{
  width:110px;height:110px;margin:auto;
  border-radius:50%;
  overflow:hidden;
  border:3px solid #22c55e;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.name{
  margin-top:15px;
  font-size:18px;
  font-weight:800;
}

.badge{
  display:inline-block;
  margin-top:10px;
  padding:6px 14px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  font-size:12px;
}

.position{
  margin-top:8px;
  color:#22c55e;
  font-weight:600;
  font-size:12px;
}

.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.6;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="header">

</div>

<div class="card"><div class="avatar"><img src="https://i.pravatar.cc/150?img=2"></div><div class="name">Player A2</div><div class="badge">Age 23</div><div class="position">Midfielder</div></div>

<div class="card"><div class="avatar"><img src="https://i.pravatar.cc/150?img=6"></div><div class="name">Player A6</div><div class="badge">Age 25</div><div class="position">Defender</div></div>
