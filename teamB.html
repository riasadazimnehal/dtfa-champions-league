<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team B - DTFA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
  text-align:center;
}

h1{margin-top:30px;}
.subtitle{opacity:0.7;}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  width:85%;
  margin:40px auto;
}

.card{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:15px;
  padding:20px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:rgba(34,197,94,0.2);
}

.avatar{
  width:60px;height:60px;
  border-radius:50%;
  background:#ef4444;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

.back{
  display:block;
  margin:20px;
  color:white;
  text-decoration:none;
  opacity:0.7;
}
</style>

</head>

<body>

<h1>🔴 Team B</h1>
<p class="subtitle">Player Squad</p>

<div class="grid">

  <div class="card">
    <div class="avatar">B1</div>
    <h3>Player B1</h3>
    <p>⚽ Goals: 4</p>
    <p>🎮 Matches: 3</p>
  </div>

  <div class="card">
    <div class="avatar">B2</div>
    <h3>Player B2</h3>
    <p>⚽ Goals: 1</p>
    <p>🎮 Matches: 3</p>
  </div>

  <div class="card">
    <div class="avatar">B3</div>
    <h3>Player B3</h3>
    <p>⚽ Goals: 3</p>
    <p>🎮 Matches: 3</p>
  </div>

  <div class="card">
    <div class="avatar">B4</div>
    <h3>Player B4</h3>
    <p>⚽ Goals: 2</p>
    <p>🎮 Matches: 3</p>
  </div>

</div>

<a class="back" href="champions.html">⬅ Back</a>

</body>
</html>
