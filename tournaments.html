<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Tournaments</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
  text-align:center;
}

/* HEADER */
h1{
  margin-top:30px;
  font-size:32px;
}

p{
  opacity:0.7;
}

/* CONTAINER */
.container{
  width:85%;
  margin:50px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  padding:25px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter:blur(10px);
}

.card:hover{
  transform:scale(1.05);
  background:rgba(34,197,94,0.15);
  box-shadow:0 0 20px rgba(34,197,94,0.3);
}

/* TITLE */
.title{
  font-size:18px;
  font-weight:bold;
}

/* BADGE */
.badge{
  display:inline-block;
  margin-top:10px;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  background:#22c55e;
}

.lock{
  background:#facc15;
  color:black;
}

/* COMING SOON SCREEN */
#coming{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.neon{
  font-size:50px;
  color:#22c55e;
  text-shadow:0 0 10px #22c55e,0 0 30px #22c55e;
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

.sub{
  margin-top:10px;
  opacity:0.7;
}

.back{
  display:block;
  margin:30px;
  color:white;
  opacity:0.7;
  text-decoration:none;
}
</style>

</head>

<body>

<h1>🏆 DTFA TOURNAMENTS</h1>
<p>Select Tournament</p>

<div class="container">

  <div class="card" onclick="openChampions()">
    <div class="title">DTFA Champions League</div>
    <div class="badge">ACTIVE</div>
  </div>

  <div class="card" onclick="comingSoon()">
    <div class="title">DTFA Premier League 2026</div>
    <div class="badge lock">COMING SOON</div>
  </div>

</div>

<a class="back" href="visit.html">⬅ Back to Menu</a>

<!-- COMING SOON -->
<div id="coming">
  <div class="neon">COMING SOON</div>
  <div class="sub">DTFA PREMIER LEAGUE 2026</div>
</div>

<script>
function openChampions(){
  window.location.href = "champions.html";
}

function comingSoon(){
  document.getElementById("coming").style.display="flex";

  setTimeout(()=>{
    document.getElementById("coming").style.display="none";
  },2500);
}
</script>

</body>
</html>
