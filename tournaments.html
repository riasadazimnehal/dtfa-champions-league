<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTFA Tournaments</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;

    background:
    linear-gradient(
        rgba(0,0,0,.75),
        rgba(0,0,0,.88)
    ),
    url('https://img.magnific.com/free-photo/people-soccer-stadium_23-2151548540.jpg?semt=ais_hybrid&w=740&q=80');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* Animated Lights */

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at 20% 20%,rgba(34,197,94,.12),transparent 30%),
    radial-gradient(circle at 80% 20%,rgba(59,130,246,.12),transparent 30%),
    radial-gradient(circle at 50% 90%,rgba(255,255,255,.05),transparent 40%);

    animation:lights 8s infinite alternate ease-in-out;
}

@keyframes lights{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.15);
    }
}

.container{
    position:relative;
    z-index:10;
    width:90%;
    max-width:1200px;
    text-align:center;
}

/* Trophy */

.trophy{
    font-size:90px;
    margin-bottom:15px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}

/* Heading */

.title{
    font-size:52px;
    font-weight:900;
    letter-spacing:3px;
    text-shadow:0 0 25px rgba(255,255,255,.25);
}

.subtitle{
    margin-top:10px;
    margin-bottom:50px;
    opacity:.75;
}

/* Cards */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:30px;
}

.card{
    text-decoration:none;
    color:white;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);

    backdrop-filter:blur(16px);

    border-radius:28px;
    padding:40px;

    position:relative;
    overflow:hidden;

    transition:.4s;
}

.card:hover{
    transform:translateY(-12px) scale(1.04);
}

.champions:hover{
    border-color:#22c55e;
    box-shadow:0 0 45px rgba(34,197,94,.35);
}

.premier:hover{
    border-color:#facc15;
    box-shadow:0 0 45px rgba(250,204,21,.35);
}

.card::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:100%;
    height:100%;

    background:
    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.15),
        transparent
    );

    transition:.8s;
}

.card:hover::before{
    left:120%;
}

.icon{
    font-size:70px;
    margin-bottom:15px;
}

.name{
    font-size:28px;
    font-weight:800;
    margin-bottom:10px;
}

.desc{
    font-size:14px;
    opacity:.75;
}

.badge{
    display:inline-block;
    margin-top:20px;

    padding:10px 20px;

    background:#facc15;
    color:black;

    border-radius:30px;

    font-weight:800;

    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

.back{
    display:inline-block;
    margin-top:40px;

    padding:14px 30px;

    border-radius:30px;

    text-decoration:none;
    color:white;

    background:rgba(255,255,255,.08);

    transition:.3s;
}

.back:hover{
    background:rgba(255,255,255,.18);
}

@media(max-width:768px){

    .title{
        font-size:36px;
    }

    .trophy{
        font-size:70px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="trophy">🏆</div>

    <div class="title">
        DTFA TOURNAMENTS
    </div>

    <div class="subtitle">
        Select Your Competition
    </div>

    <div class="grid">

        <a href="champions.html" class="card champions">

            <div class="icon">⚽</div>

            <div class="name">
                DTFA Champions League
            </div>

            <div class="desc">
                Teams • Players • Fixtures • Standings
            </div>

        </a>

        <div class="card premier">

            <div class="icon">⭐</div>

            <div class="name">
                DTFA Premier League 2026
            </div>

            <div class="desc">
                New Season Under Preparation
            </div>

            <div class="badge">
                COMING SOON
            </div>

        </div>

    </div>

    <a href="visit.html" class="back">
        ⬅ Back To Dashboard
    </a>

</div>

</body>
</html>
