<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best of the Bests</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  min-height:100vh;
  color:white;

  background:
  linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=1920&q=80');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* HEADER */
.header{
  text-align:center;
  padding:50px 10px 10px;
}

.header h1{
  font-size:44px;
  font-weight:900;
  letter-spacing:2px;
}

.header p{
  opacity:0.7;
}

/* CONTAINER */
.container{
  width:90%;
  margin:40px auto;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* CARD HORIZONTAL */
.card{
  display:flex;
  align-items:center;
  gap:20px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);

  border-radius:18px;
  padding:18px;

  transition:0.4s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:scale(1.02);
  border-color:#facc15;
  box-shadow:0 0 40px rgba(255,215,0,0.25);
}

/* PLAYER IMAGE (BIG LEFT SIDE) */
.img{
  width:140px;
  height:140px;
  border-radius:15px;
  overflow:hidden;
  flex-shrink:0;
  border:2px solid rgba(255,255,255,0.25);
}

.img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INFO */
.info{
  flex:1;
}

/* ROLE */
.role{
  font-size:13px;
  opacity:0.7;
}

/* NAME */
.name{
  font-size:22px;
  font-weight:900;
  margin-top:5px;
}

/* TEAM */
.team{
  font-size:13px;
  opacity:0.75;
  margin-top:4px;
}

/* STATS */
.stats{
  margin-top:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.stat{
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;

  background:rgba(255,215,0,0.12);
  border:1px solid rgba(255,215,0,0.25);
}

/* SECTION TITLE */
.title{
  text-align:center;
  font-size:28px;
  font-weight:900;
  margin-top:25px;
  color:#facc15;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.6;
  text-decoration:none;
}

.back:hover{opacity:1;}

@media(max-width:600px){
  .card{
    flex-direction:column;
    text-align:center;
  }

  .img{
    width:200px;
    height:200px;
  }

  .stats{
    justify-content:center;
  }
}

</style>
</head>

<body>

<div class="header">
  <h1>🏆 BEST OF THE BESTS</h1>
  <p>Legendary Awards</p>
</div>

<div class="title">🧤 BEST GOALKEEPER</div>

<div class="container">

  <div class="card">
    <div class="img">
      <img src="https://i.pravatar.cc/300?img=12">
    </div>

    <div class="info">
      <div class="role">Goalkeeper</div>
      <div class="name">Player GK</div>
      <div class="team">Incognito FC</div>

      <div class="stats">
        <div class="stat">Clean Sheets: 5</div>
        <div class="stat">Saves: 38</div>
      </div>
    </div>
  </div>

</div>

<div class="title">🛡️ BEST DEFENDER</div>

<div class="container">

  <div class="card">
    <div class="img">
      <img src="https://i.pravatar.cc/300?img=5">
    </div>

    <div class="info">
      <div class="role">Defender</div>
      <div class="name">Player DEF</div>
      <div class="team">Team B</div>

      <div class="stats">
        <div class="stat">Tackles: 42</div>
        <div class="stat">Blocks: 18</div>
      </div>
    </div>
  </div>

</div>

<div class="title">🔥 BEST FORWARD</div>

<div class="container">

  <div class="card">
    <div class="img">
      <img src="https://i.pravatar.cc/300?img=3">
    </div>

    <div class="info">
      <div class="role">Forward</div>
      <div class="name">Player FW</div>
      <div class="team">Team C</div>

      <div class="stats">
        <div class="stat">Goals: 12</div>
        <div class="stat">Assists: 4</div>
      </div>
    </div>
  </div>

</div>

<a class="back" href="visit.html">⬅ Back</a>

</body>
</html>
