<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best of the Bests</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  min-height:100vh;
  color:white;

  background:
  linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&w=1920&q=80');

  background-size:cover;
  background-position:center;
  overflow:hidden;
}

/* HEADER */
.header{
  text-align:center;
  padding:35px 10px 10px;
}

.header h1{
  font-size:40px;
  font-weight:900;
}

/* WRAPPER */
.wrapper{
  width:100%;
  height:75vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* CAROUSEL TRACK */
.carousel{
  display:flex;
  gap:40px;
  transition:0.7s ease;
  align-items:center;
}

/* CARD */
.card{
  width:650px;
  height:320px;

  display:flex;
  gap:25px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);

  border-radius:20px;
  padding:20px;

  opacity:0.3;
  transform:scale(0.85);
  transition:0.6s;
}

/* CENTER ACTIVE */
.card.active{
  opacity:1;
  transform:scale(1.15);
  border-color:#facc15;
  box-shadow:0 0 60px rgba(255,215,0,0.35);
  z-index:5;
}

/* IMAGE */
.img{
  width:45%;
  height:100%;
  border-radius:15px;
  overflow:hidden;
}

.img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INFO */
.info{
  width:55%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.role{
  font-size:13px;
  opacity:0.8;
}

.name{
  font-size:26px;
  font-weight:900;
  margin-top:5px;
}

.team{
  font-size:13px;
  opacity:0.7;
  margin-top:4px;
}

/* STATS */
.stats{
  margin-top:15px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.stat{
  font-size:12px;
  padding:6px 12px;
  border-radius:20px;

  background:rgba(255,215,0,0.12);
  border:1px solid rgba(255,215,0,0.25);
}

/* BUTTONS */
.btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:55px;
  height:55px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);
  color:white;
  font-size:28px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  z-index:10;
}

.btn:hover{
  background:#facc15;
  color:black;
}

.left-btn{left:25px;}
.right-btn{right:25px;}

/* BACK */
.back{
  position:absolute;
  bottom:15px;
  width:100%;
  text-align:center;
  color:white;
  opacity:0.6;
  text-decoration:none;
}

.back:hover{opacity:1;}

</style>
</head>

<body>

<div class="header">
  <h1>🏆 BEST OF THE BESTS</h1>
</div>

<div class="wrapper">

  <button class="btn left-btn" onclick="move(-1)">❮</button>

  <div class="carousel" id="carousel">

    <!-- DEFENDER -->
    <div class="card active">
      <div class="img"><img src="https://i.pravatar.cc/500?img=5"></div>
      <div class="info">
        <div class="role">Best Defender</div>
        <div class="name">Player DEF</div>
        <div class="team">Team B</div>
        <div class="stats">
          <div class="stat">Tackles 42</div>
          <div class="stat">Blocks 18</div>
        </div>
      </div>
    </div>

    <!-- FORWARD -->
    <div class="card">
      <div class="img"><img src="https://i.pravatar.cc/500?img=3"></div>
      <div class="info">
        <div class="role">Best Forward</div>
        <div class="name">Player FW</div>
        <div class="team">Team C</div>
        <div class="stats">
          <div class="stat">Goals 12</div>
          <div class="stat">Assists 4</div>
        </div>
      </div>
    </div>

    <!-- GK -->
    <div class="card">
      <div class="img"><img src="https://i.pravatar.cc/500?img=12"></div>
      <div class="info">
        <div class="role">Best GK</div>
        <div class="name">Player GK</div>
        <div class="team">Incognito FC</div>
        <div class="stats">
          <div class="stat">Saves 38</div>
          <div class="stat">Clean Sheets 5</div>
        </div>
      </div>
    </div>

  </div>

  <button class="btn right-btn" onclick="move(1)">❯</button>

</div>

<a class="back" href="visit.html">⬅ Back</a>

<script>

let index = 0;
const cards = document.querySelectorAll(".card");

function update(){
  cards.forEach((c,i)=>{
    c.classList.toggle("active", i === index);
  });

  const carousel = document.getElementById("carousel");

  // CENTER FOCUS CALCULATION
  const offset = (window.innerWidth / 2) - 325 - (index * 690);
  carousel.style.transform = `translateX(${offset}px)`;
}

function move(dir){
  index += dir;

  if(index < 0) index = 0;
  if(index > cards.length - 1) index = cards.length - 1;

  update();
}

window.onload = update;
window.onresize = update;

</script>

</body>
</html>
