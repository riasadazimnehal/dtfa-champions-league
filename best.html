<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best of the Bests</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat;
}

body{
color:white;
background:
radial-gradient(circle at 20% 20%, rgba(255,215,0,.08), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(34,197,94,.08), transparent 40%),
linear-gradient(rgba(0,0,0,.92),rgba(0,0,0,.97)),
url('https://img.allfootballapp.com/www/M00/10/42/720x-/-/-/rB8CLFuWTuCAWpVWAASUD3B6ZMM699.jpg.webp');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HEADER */
.header{
text-align:center;
padding:40px 15px;
}

.header h1{
font-size:42px;
font-weight:900;
color:#facc15;
text-shadow:0 0 20px rgba(255,215,0,.2);
}

.header p{
opacity:.7;
margin-top:6px;
}

/* CONTAINER */
.container{
width:92%;
margin:auto;
padding-bottom:60px;
display:flex;
flex-direction:column;
gap:20px;
}

/* CARD */
.card{
display:flex;
gap:20px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.12);
border-radius:18px;

overflow:hidden;
transition:.3s;
}

.card:hover{
transform:scale(1.01);
border-color:#facc15;
box-shadow:0 0 40px rgba(255,215,0,.15);
}

/* LEFT IMAGE */
.left{
width:240px;
min-width:240px;
}

.left img{
width:100%;
height:100%;
object-fit:cover;
}

/* RIGHT */
.right{
flex:1;
padding:18px;
display:flex;
flex-direction:column;
justify-content:center;
gap:8px;
}

.role{
display:inline-block;
padding:5px 12px;
background:#facc15;
color:black;
font-weight:900;
border-radius:20px;
font-size:12px;
width:max-content;
}

.name{
font-size:26px;
font-weight:900;
}

.team{
opacity:.7;
font-size:13px;
}

/* STATS */
.stats{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.stat{
font-size:12px;
padding:6px 10px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){

.card{
flex-direction:column;
}

.left{
width:100%;
height:240px;
}

.header h1{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="header">
<h1>🏆 BEST OF THE BESTS</h1>
<p>Hall of Fame Level Recognition</p>
</div>

<div class="container">

<!-- PLAYER 1 -->
<div class="card">

<div class="left">
<img src="nehal.jpg">
</div>

<div class="right">

<div class="role">MVP 2026</div>
<div class="name">NEHAL</div>
<div class="team">Incognito FC</div>

<div class="stats">
<div class="stat">⚽ 25 Goals</div>
<div class="stat">🎯 17 Assists</div>
<div class="stat">🔥 Tournament Star</div>
</div>

</div>

</div>

<!-- PLAYER 2 -->
<div class="card">

<div class="left">
<img src="https://i.pravatar.cc/500?img=3">
</div>

<div class="right">

<div class="role">BEST FORWARD</div>
<div class="name">Player FW</div>
<div class="team">Team C</div>

<div class="stats">
<div class="stat">⚽ 12 Goals</div>
<div class="stat">🔥 Key Player</div>
</div>

</div>

</div>

<!-- PLAYER 3 -->
<div class="card">

<div class="left">
<img src="https://i.pravatar.cc/500?img=12">
</div>

<div class="right">

<div class="role">BEST GK</div>
<div class="name">Player GK</div>
<div class="team">Defenders FC</div>

<div class="stats">
<div class="stat">🧤 8 Clean Sheets</div>
<div class="stat">👑 Captain</div>
</div>

</div>

</div>

</div>

</body>
</html>
