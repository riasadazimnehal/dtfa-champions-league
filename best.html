<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best of the Bests</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  min-height:100vh;
  color:white;

  background:
  linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.95)),
  url('https://img.allfootballapp.com/www/M00/10/42/720x-/-/-/rB8CLFuWTuCAWpVWAASUD3B6ZMM699.jpg.webp');

  background-size:cover;
  background-position:center;

  overflow-x:hidden;
}

/* HEADER */
.header{
  text-align:center;
  padding:30px 10px;
}

.header h1{
  font-size:40px;
  font-weight:900;
}

/* WRAPPER */
.wrapper{
  width:100%;
  min-height:75vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* CAROUSEL */
.carousel{
  display:flex;
  gap:40px;
  transition:0.7s ease;
  align-items:center;
}

/* CARD */
.card{
  width:650px;
  height:320px;

  display:flex;
  gap:25px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);

  border-radius:20px;
  padding:20px;

  opacity:0.4;
  transform:scale(0.85);
  transition:0.6s;
}

/* ACTIVE */
.card.active{
  opacity:1;
  transform:scale(1);
  border-color:#facc15;
  box-shadow:0 0 60px rgba(255,215,0,0.35);
  z-index:5;
}

/* IMAGE */
.img{
  width:45%;
  height:100%;
  border-radius:15px;
  overflow:hidden;
}

.img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INFO */
.info{
  width:55%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* TEXT */
.role{font-size:13px; opacity:0.8;}
.name{font-size:26px; font-weight:900;}
.team{font-size:13px; opacity:0.7;}

.stats{
  margin-top:15px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.stat{
  font-size:12px;
  padding:6px 12px;
  border-radius:20px;
  background:rgba(255,215,0,0.12);
  border:1px solid rgba(255,215,0,0.25);
}

/* BUTTONS */
.btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:24px;
  cursor:pointer;
  z-index:10;
}

.left-btn{left:10px;}
.right-btn{right:10px;}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:20px;
  opacity:0.6;
  color:white;
  text-decoration:none;
}

/* 🔥 MOBILE FIX */
@media(max-width:768px){

.wrapper{
  padding:20px 0;
}

/* CARD FULL MOBILE */
.card{
  width:90vw;
  height:auto;
  flex-direction:column;
  transform:scale(1);
}

.img{
  width:100%;
  height:220px;
}

.info{
  width:100%;
  padding-top:10px;
}

/* disable heavy center offset feel */
.carousel{
  gap:20px;
  transform:none !important;
  flex-direction:column;
}

/* buttons smaller */
.btn{
  width:40px;
  height:40px;
  font-size:18px;
}

.header h1{
  font-size:26px;
}

}

</style>
</head>

<body>

<div class="header">
  <h1>🏆 BEST OF THE BESTS</h1>
</div>

<div class="wrapper">

  <button class="btn left-btn" onclick="move(-1)">❮</button>

  <div class="carousel" id="carousel">

    <div class="card active">
      <div class="img"><img src="nehal.jpg"></div>
      <div class="info">
        <div class="role">MVP 🔥</div>
        <div class="name">NEHAL</div>
        <div class="team">Incognito FC</div>
        <div class="stats">
          <div class="stat">Goals 25</div>
          <div class="stat">Assists 17</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="img"><img src="https://i.pravatar.cc/500?img=3"></div>
      <div class="info">
        <div class="role">Best Forward</div>
        <div class="name">Player FW</div>
        <div class="team">Team C</div>
        <div class="stats">
          <div class="stat">Goals 12</div>
        </div>
      </div>
    </div>

  </div>

  <button class="btn right-btn" onclick="move(1)">❯</button>

</div>

<a class="back" href="visit.html">⬅ Back</a>

<script>

let index = 0;
const cards = document.querySelectorAll(".card");

function update(){
  cards.forEach((c,i)=>{
    c.classList.toggle("active", i === index);
  });
}

function move(dir){
  index += dir;
  if(index < 0) index = 0;
  if(index > cards.length - 1) index = cards.length - 1;
  update();
}

</script>

</body>
</html>
