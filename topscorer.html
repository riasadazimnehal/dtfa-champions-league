<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Top Scorer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

/* HEADER */
h1{
  text-align:center;
  margin-top:30px;
}

p{
  text-align:center;
  opacity:0.7;
}

/* GRID */
.container{
  width:85%;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:15px;
  padding:20px;
  text-align:center;
  transition:0.3s;
  backdrop-filter:blur(10px);
}

.card:hover{
  transform:scale(1.05);
  background:rgba(34,197,94,0.15);
}

/* AVATAR */
.avatar{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#22c55e;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 0 15px rgba(34,197,94,0.5);
}

/* GOLDEN BOOT */
.gold{
  border:2px solid gold;
  box-shadow:0 0 20px gold;
}

/* SILVER */
.silver{
  border:2px solid silver;
}

/* BRONZE */
.bronze{
  border:2px solid #cd7f32;
}

/* GOALS */
.goals{
  font-size:20px;
  margin-top:10px;
  color:#22c55e;
  font-weight:bold;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.7;
  text-decoration:none;
}
</style>

</head>

<body>

<h1>🏆 DTFA TOP SCORER</h1>
<p>Golden Boot Race</p>

<div class="container">

  <div class="card gold">
    <div class="avatar">C10</div>
    <h3>Player C10</h3>
    <div class="goals">⚽ 7 Goals</div>
  </div>

  <div class="card silver">
    <div class="avatar">A10</div>
    <h3>Player A10</h3>
    <div class="goals">⚽ 7 Goals</div>
  </div>

  <div class="card bronze">
    <div class="avatar">C1</div>
    <h3>Player C1</h3>
    <div class="goals">⚽ 6 Goals</div>
  </div>

  <div class="card">
    <div class="avatar">B10</div>
    <h3>Player B10</h3>
    <div class="goals">⚽ 6 Goals</div>
  </div>

  <div class="card">
    <div class="avatar">D10</div>
    <h3>Player D10</h3>
    <div class="goals">⚽ 6 Goals</div>
  </div>

  <div class="card">
    <div class="avatar">A1</div>
    <h3>Player A1</h3>
    <div class="goals">⚽ 5 Goals</div>
  </div>

</div>

<a class="back" href="visit.html">⬅ Back to Menu</a>

</body>
</html>
