<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Point Table</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  min-height:100vh;
  color:white;

  background:
  linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1522778034537-20a2486be803?auto=format&fit=crop&w=1920&q=80');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

.header{
  text-align:center;
  padding:35px 10px;
}

.header h1{
  font-size:40px;
  font-weight:900;
  letter-spacing:2px;
}

/* TABLE */
table{
  width:85%;
  margin:20px auto;
  border-collapse:collapse;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);
  border-radius:15px;
  overflow:hidden;
}

th,td{
  padding:14px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
  background:rgba(34,197,94,0.25);
  font-weight:800;
}

/* BUTTONS */
.btn{
  display:block;
  margin:12px auto;
  padding:12px 18px;
  border:none;
  border-radius:25px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

.reset{
  background:#ef4444;
}

/* ADMIN PANEL */
#adminPanel{
  display:none;
  width:85%;
  margin:20px auto;
  padding:20px;

  background:rgba(255,255,255,0.06);
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.2);
}

input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  width:140px;
}

.save{
  background:#facc15;
  border:none;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.back{
  display:block;
  text-align:center;
  margin:25px;
  color:white;
  opacity:0.6;
  text-decoration:none;
}

.back:hover{opacity:1;}

</style>
</head>

<body>

<div class="header">
  <h1>🏆 DTFA POINT TABLE</h1>
</div>

<!-- TABLE -->
<table>
  <tr>
    <th>Team</th>
    <th>Played</th>
    <th>Won</th>
    <th>Draw</th>
    <th>Lost</th>
    <th>G/D</th>
    <th>Points</th>
  </tr>

  <tr>
    <td>Incognito FC</td>
    <td>4</td>
    <td>3</td>
    <td>1</td>
    <td>0</td>
    <td>+6</td>
    <td>10</td>
  </tr>

  <tr>
    <td>Team B</td>
    <td>4</td>
    <td>2</td>
    <td>1</td>
    <td>1</td>
    <td>+1</td>
    <td>7</td>
  </tr>

  <tr>
    <td>Team C</td>
    <td>4</td>
    <td>1</td>
    <td>1</td>
    <td>2</td>
    <td>-2</td>
    <td>4</td>
  </tr>

  <tr>
    <td>Team D</td>
    <td>4</td>
    <td>0</td>
    <td>1</td>
    <td>3</td>
    <td>-5</td>
    <td>1</td>
  </tr>

</table>

<!-- BUTTONS -->
<button class="btn" onclick="checkAccess()">🔴 Admin Panel</button>
<button class="btn reset" onclick="resetTable()">♻ Reset Table</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <h3>⚽ Admin Update Panel</h3>

  <input type="text" placeholder="Team Name">
  <input type="number" placeholder="Played">
  <input type="number" placeholder="Won">
  <input type="number" placeholder="Draw">
  <input type="number" placeholder="Lost">
  <input type="text" placeholder="G/D">
  <input type="number" placeholder="Points">

  <button class="save">Save Update</button>

</div>

<a class="back" href="visit.html">⬅ Back</a>

<script>

const admins = ["834", "299"];

/* ADMIN ACCESS */
function checkAccess(){

  let user = prompt("Enter Admin Code:");

  if(admins.includes(user)){

    localStorage.setItem("role","admin");
    document.getElementById("adminPanel").style.display = "block";

    alert("✅ Admin Access Granted");

  } else {
    alert("❌ Access Denied");
  }
}

/* RESET (ADMIN ONLY) */
function resetTable(){

  let user = prompt("Enter Admin Code to Reset:");

  if(admins.includes(user)){

    if(confirm("⚠ Are you sure to reset table?")){

      alert("♻ Table Reset Done (Demo Mode)");
      location.reload();
    }

  } else {
    alert("❌ Only Admin Can Reset");
  }
}

</script>

</body>
</html>
