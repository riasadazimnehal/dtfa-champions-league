<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Point Table</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:30px;
}

h1{
  margin:0;
}

/* TABLE */
table{
  width:85%;
  margin:20px auto;
  border-collapse:collapse;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:12px;
  overflow:hidden;
}

th,td{
  padding:15px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
  background:rgba(34,197,94,0.2);
}

/* BUTTON */
.btn{
  display:block;
  margin:20px auto;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#16a34a;
}

/* PANEL */
#updatePanel{
  display:none;
  width:85%;
  margin:20px auto;
  padding:20px;
  background:rgba(255,255,255,0.06);
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.15);
}

input{
  padding:10px;
  margin:8px;
  border:none;
  border-radius:8px;
  width:200px;
}

.save{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#facc15;
  cursor:pointer;
}

.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.6;
  text-decoration:none;
}

.back:hover{opacity:1;}

</style>
</head>

<body>

<div class="header">
  <h1>📊 DTFA POINT TABLE</h1>
</div>

<!-- POINT TABLE -->
<table>
  <tr>
    <th>Team</th>
    <th>Played</th>
    <th>Won</th>
    <th>Lost</th>
    <th>Points</th>
  </tr>

  <tr>
    <td>Team A</td>
    <td>3</td>
    <td>2</td>
    <td>1</td>
    <td>6</td>
  </tr>

  <tr>
    <td>Team B</td>
    <td>3</td>
    <td>1</td>
    <td>2</td>
    <td>3</td>
  </tr>

</table>

<!-- BUTTON -->
<button class="btn" onclick="checkAccess()">🔴 Live Update</button>

<!-- UPDATE PANEL -->
<div id="updatePanel">

  <h3>⚽ Live Update Panel (Admin Only)</h3>

  <input type="text" placeholder="Team Name">
  <input type="text" placeholder="Played">
  <input type="text" placeholder="Won">
  <input type="text" placeholder="Lost">
  <input type="text" placeholder="Points">

  <button class="save">Save Update</button>

</div>

<a class="back" href="visit.html">⬅ Back to Dashboard</a>

<script>

/* LOCK SYSTEM */
function checkAccess(){

  let role = localStorage.getItem("role");

  if(role === "admin"){
    document.getElementById("updatePanel").style.display = "block";
    alert("✅ Admin Access Granted");
  } 
  else{
    alert("❌ Access Denied! Only Admin can update.");
  }
}

</script>

</body>
</html>
