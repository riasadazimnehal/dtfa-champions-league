<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTFA Champions League Table</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
min-height:100vh;
color:white;
overflow-x:hidden;

background:
linear-gradient(rgba(0,0,0,.88),rgba(0,0,0,.95)),
url('https://www.sky.de/static/img/crm/sky_23-07_sporthub_text_s.jpg');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* CHAMPIONS LEAGUE LIGHTS */

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;

background:
radial-gradient(circle at 20% 20%, rgba(59,130,246,.18), transparent 30%),
radial-gradient(circle at 80% 20%, rgba(34,197,94,.15), transparent 30%),
radial-gradient(circle at 50% 100%, rgba(255,215,0,.08), transparent 40%);

animation:lights 8s infinite alternate ease-in-out;
}

@keyframes lights{
from{transform:scale(1);}
to{transform:scale(1.12);}
}

/* HEADER */

.header{
text-align:center;
padding:40px 15px 20px;
position:relative;
z-index:10;
}

.header h1{

font-size:55px;
font-weight:900;
letter-spacing:3px;

background:
linear-gradient(
90deg,
#ffffff,
#FFD700,
#ffffff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 25px rgba(255,215,0,.35);

}

.subtitle{
margin-top:10px;
opacity:.85;
letter-spacing:1px;
}

/* LIVE BADGE */

.live{

display:inline-block;

margin-top:18px;

padding:10px 18px;

border-radius:30px;

background:
rgba(255,0,0,.12);

border:
1px solid rgba(255,0,0,.4);

font-weight:700;

animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
opacity:.4;
}
}

/* TABLE WRAP */

.table-wrap{
width:92%;
max-width:1200px;
margin:auto;
position:relative;
z-index:10;
}

/* TABLE */

table{

width:100%;
border-collapse:collapse;

background:
rgba(255,255,255,.06);

backdrop-filter:blur(18px);

border-radius:25px;
overflow:hidden;

box-shadow:
0 0 30px rgba(34,197,94,.12),
0 0 60px rgba(59,130,246,.08);

animation:floatTable 6s infinite ease-in-out;
}

@keyframes floatTable{

50%{
transform:translateY(-5px);
}

}

/* HEADER ROW */

th{

padding:18px;

background:
linear-gradient(
90deg,
rgba(34,197,94,.30),
rgba(59,130,246,.30)
);

font-size:14px;
font-weight:800;
letter-spacing:1px;
text-transform:uppercase;

}

/* ROWS */

td{

padding:16px;
text-align:center;

border-bottom:
1px solid rgba(255,255,255,.08);

transition:.3s;
}

tr:hover{

background:
rgba(34,197,94,.12);

transform:scale(1.01);
}

/* TOP 3 */

.first{

background:
linear-gradient(
90deg,
rgba(255,215,0,.20),
rgba(255,215,0,.05)
);

box-shadow:
inset 6px 0 #FFD700;
}

.second{

background:
linear-gradient(
90deg,
rgba(192,192,192,.16),
rgba(192,192,192,.04)
);

box-shadow:
inset 6px 0 silver;
}

.third{

background:
linear-gradient(
90deg,
rgba(205,127,50,.16),
rgba(205,127,50,.04)
);

box-shadow:
inset 6px 0 #CD7F32;
}

.rank{
font-size:22px;
font-weight:900;
}

.points{
font-size:18px;
font-weight:900;
color:#22c55e;
}

.team{
font-weight:700;
}

/* BACK */

.back{

display:block;

width:220px;

margin:35px auto;

padding:14px;

text-align:center;
text-decoration:none;

color:white;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.15);

border-radius:40px;

transition:.3s;
}

.back:hover{

transform:translateY(-3px);

background:
rgba(34,197,94,.18);

}

/* MOBILE */

@media(max-width:768px){

.header h1{
font-size:34px;
}

th,td{
padding:10px;
font-size:12px;
}

.rank{
font-size:16px;
}

}

</style>
</head>

<body>

<a href="index.html" class="home-btn">🏠 Home</a>

<style>
.home-btn{
position:fixed;
top:15px;
left:15px;
z-index:9999;

padding:10px 16px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.2);

color:white;
text-decoration:none;
font-weight:700;
border-radius:12px;

transition:.3s;
}

.home-btn:hover{
background:#22c55e;
color:black;
transform:scale(1.05);
}
</style>
  
<div class="header">

<h1>🏆 DTFA CHAMPIONS TABLE</h1>

<div class="subtitle">
DHAKA TURF FOOTBALL ASSOCIATION
</div>

<div class="live">
🔴 LIVE STANDINGS
</div>

</div>

<div class="table-wrap">

<table id="table">

<tr>
<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GD</th>
<th>PTS</th>
</tr>

</table>

</div>

<a href="visit.html" class="back">⬅ Back To Hub</a>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwcDYRcBWcXLw18jE1C-MxTFC8sugYeJGjLvJDyB8HW6JQwd5sOutcEUAqR27LosIiF/exec";

async function loadTable(){

try{

const res = await fetch(API);
const data = await res.json();

data.sort((a,b)=>{

if(b.PTS !== a.PTS)
return b.PTS-a.PTS;

return b.GD-a.GD;

});

let html=`

<tr>
<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GD</th>
<th>PTS</th>
</tr>

`;

data.forEach((t,index)=>{

let cls="";

if(index===0) cls="first";
if(index===1) cls="second";
if(index===2) cls="third";

let pos=index+1;
let team=t.team;

if(index===0){
pos="🥇";
team="👑 " + team;
}

if(index===1){
pos="🥈";
team="⚔️ " + team;
}

if(index===2){
pos="🥉";
team="🔥 " + team;
}

html += `

<tr class="${cls}">
<td class="rank">${pos}</td>
<td class="team">${team}</td>
<td>${t.P}</td>
<td>${t.W}</td>
<td>${t.D}</td>
<td>${t.L}</td>
<td>${t.GD}</td>
<td class="points">${t.PTS}</td>
</tr>

`;

});

document.getElementById("table").innerHTML=html;

}catch(err){
console.log(err);
}

}

loadTable();
setInterval(loadTable,10000);

</script>

</body>
</html>
