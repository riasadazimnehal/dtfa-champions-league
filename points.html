<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Point Table</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body{
  min-height:100vh;
  color:white;

  background:
  linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.95)),
  url('https://images.unsplash.com/photo-1522778034537-20a2486be803?auto=format&fit=crop&w=1920&q=80');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* HEADER */
.header{
  text-align:center;
  padding:35px 10px;
}

.header h1{
  font-size:40px;
  font-weight:900;
  letter-spacing:2px;
}

/* TABLE */
table{
  width:85%;
  margin:20px auto;
  border-collapse:collapse;

  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);

  border-radius:15px;
  overflow:hidden;

  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

th,td{
  padding:16px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
  background:rgba(34,197,94,0.25);
  font-weight:800;
  text-transform:uppercase;
}

tr:hover{
  background:rgba(34,197,94,0.08);
}

/* BUTTON */
.btn{
  display:block;
  margin:20px auto;
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* ADMIN PANEL */
#adminPanel{
  display:none;
  width:85%;
  margin:20px auto;
  padding:20px;

  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:15px;

  backdrop-filter:blur(10px);
}

input{
  padding:10px;
  margin:6px;
  border:none;
  border-radius:8px;
  width:160px;
}

.save{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#facc15;
  cursor:pointer;
  font-weight:bold;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.6;
  text-decoration:none;
}

.back:hover{opacity:1;}

</style>
</head>

<body>

<div class="header">
  <h1>🏆 DTFA POINT TABLE</h1>
</div>

<!-- TABLE -->
<table>
  <tr>
    <th>Team</th>
    <th>Played</th>
    <th>Won</th>
    <th>Lost</th>
    <th>G/D</th>
    <th>Points</th>
  </tr>

  <tr>
    <td>Incognito FC</td>
    <td>4</td>
    <td>3</td>
    <td>1</td>
    <td>+5</td>
    <td>9</td>
  </tr>

  <tr>
    <td>Team B</td>
    <td>4</td>
    <td>2</td>
    <td>2</td>
    <td>+1</td>
    <td>6</td>
  </tr>

  <tr>
    <td>Team C</td>
    <td>4</td>
    <td>1</td>
    <td>3</td>
    <td>-3</td>
    <td>3</td>
  </tr>

</table>

<!-- BUTTON -->
<button class="btn" onclick="checkAccess()">🔴 Admin Update Panel</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <h3>⚽ Admin Only Update Panel</h3>

  <input type="text" placeholder="Team Name">
  <input type="number" placeholder="Played">
  <input type="number" placeholder="Won">
  <input type="number" placeholder="Lost">
  <input type="text" placeholder="G/D">
  <input type="number" placeholder="Points">

  <button class="save">Save Update</button>

</div>

<a class="back" href="visit.html">⬅ Back</a>

<script>

/* 🔐 ADMIN CODES */
const admins = ["834", "299"];

function checkAccess(){

  let user = prompt("Enter Admin Code:");

  if(admins.includes(user)){

    localStorage.setItem("role","admin");
    document.getElementById("adminPanel").style.display = "block";

    alert("✅ Admin Access Granted");

  } else {
    alert("❌ Invalid Code");
  }
}

</script>

</body>
</html>
