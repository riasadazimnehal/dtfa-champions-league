<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Point Table</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

/* HEADER */
h1{
  text-align:center;
  margin-top:30px;
}

/* TABLE */
table{
  width:85%;
  margin:40px auto;
  border-collapse:collapse;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:12px;
  overflow:hidden;
}

th,td{
  padding:15px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
  background:rgba(34,197,94,0.2);
}

/* ROW HOVER */
tr:hover{
  background:rgba(34,197,94,0.1);
}

/* RANK COLORS */
.gold{color:#facc15; font-weight:bold;}
.silver{color:#c0c0c0; font-weight:bold;}
.bronze{color:#cd7f32; font-weight:bold;}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:30px;
  color:white;
  opacity:0.7;
  text-decoration:none;
}
</style>

</head>

<body>

<h1>📊 DTFA POINT TABLE</h1>

<table>

<tr>
  <th>Rank</th>
  <th>Team</th>
  <th>Played</th>
  <th>Won</th>
  <th>Draw</th>
  <th>Lost</th>
  <th>Points</th>
</tr>

<tr>
  <td class="gold">🥇 1</td>
  <td>Team C</td>
  <td>3</td>
  <td>2</td>
  <td>1</td>
  <td>0</td>
  <td>7</td>
</tr>

<tr>
  <td class="silver">🥈 2</td>
  <td>Team A</td>
  <td>3</td>
  <td>2</td>
  <td>0</td>
  <td>1</td>
  <td>6</td>
</tr>

<tr>
  <td class="bronze">🥉 3</td>
  <td>Team D</td>
  <td>3</td>
  <td>0</td>
  <td>2</td>
  <td>1</td>
  <td>2</td>
</tr>

<tr>
  <td>4</td>
  <td>Team B</td>
  <td>3</td>
  <td>0</td>
  <td>1</td>
  <td>2</td>
  <td>1</td>
</tr>

</table>

<a class="back" href="visit.html">⬅ Back to Menu</a>

</body>
</html>
