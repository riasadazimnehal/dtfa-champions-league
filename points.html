<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DTFA Live Point System</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Montserrat;}

body{
  min-height:100vh;
  color:white;
  background:linear-gradient(rgba(0,0,0,.9),rgba(0,0,0,.95)),
  url('https://images.unsplash.com/photo-1522778034537-20a2486be803?auto=format&fit=crop&w=1920&q=80');
  background-size:cover;
}

h2{text-align:center;margin:20px;}

table{
  width:85%;
  margin:auto;
  border-collapse:collapse;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(10px);
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.1);
}

th{background:rgba(34,197,94,.25);}

.panel{
  width:85%;
  margin:20px auto;
  padding:20px;
  background:rgba(255,255,255,.05);
  border-radius:15px;
}

select,input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.submit{background:#22c55e;color:white;}
.reset{background:#ef4444;color:white;}

</style>
</head>

<body>

<h2>🏆 DTFA LIVE POINT SYSTEM</h2>

<table id="table">
<thead>
<tr>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GD</th>
<th>Pts</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="panel">

<h3>⚽ Add Match Result (ADMIN ONLY)</h3>

<select id="teamA"></select>
<select id="teamB"></select>

<input id="scoreA" type="number" placeholder="Score A">
<input id="scoreB" type="number" placeholder="Score B">

<br>

<button class="submit" onclick="addMatch()">Submit</button>
<button class="reset" onclick="resetData()">Reset</button>

</div>

<script>

const admins=["834","299"];

let teams = JSON.parse(localStorage.getItem("teams")) || {
  "Incognito FC":{P:0,W:0,D:0,L:0,GD:0,Pts:0},
  "Team B":{P:0,W:0,D:0,L:0,GD:0,Pts:0},
  "Team C":{P:0,W:0,D:0,L:0,GD:0,Pts:0},
  "Team D":{P:0,W:0,D:0,L:0,GD:0,Pts:0}
};

function save(){
  localStorage.setItem("teams",JSON.stringify(teams));
}

function isAdmin(){
  let code = prompt("Enter Admin Code:");
  return admins.includes(code);
}

function loadTeams(){
  let a=document.getElementById("teamA");
  let b=document.getElementById("teamB");

  Object.keys(teams).forEach(t=>{
    a.innerHTML+=`<option>${t}</option>`;
    b.innerHTML+=`<option>${t}</option>`;
  });
}

function render(){
  let tbody=document.querySelector("#table tbody");
  tbody.innerHTML="";

  Object.keys(teams).forEach(t=>{
    let d=teams[t];

    tbody.innerHTML+=`
      <tr>
        <td>${t}</td>
        <td>${d.P}</td>
        <td>${d.W}</td>
        <td>${d.D}</td>
        <td>${d.L}</td>
        <td>${d.GD}</td>
        <td>${d.Pts}</td>
      </tr>
    `;
  });

  save();
}

function addMatch(){

  if(!isAdmin()) return alert("❌ Admin only");

  let a=document.getElementById("teamA").value;
  let b=document.getElementById("teamB").value;
  let sa=parseInt(document.getElementById("scoreA").value);
  let sb=parseInt(document.getElementById("scoreB").value);

  if(a===b) return alert("Same team not allowed");

  if(isNaN(sa) || isNaN(sb)) return alert("Enter scores");

  teams[a].P++;
  teams[b].P++;

  teams[a].GD += (sa-sb);
  teams[b].GD += (sb-sa);

  if(sa>sb){
    teams[a].W++; teams[b].L++;
    teams[a].Pts+=3;
  }
  else if(sa<sb){
    teams[b].W++; teams[a].L++;
    teams[b].Pts+=3;
  }
  else{
    teams[a].D++; teams[b].D++;
    teams[a].Pts+=1;
    teams[b].Pts+=1;
  }

  render();
  alert("✅ Updated Successfully");
}

function resetData(){

  if(!isAdmin()) return alert("❌ Admin only");

  if(confirm("Reset all data?")){
    localStorage.removeItem("teams");
    location.reload();
  }
}

loadTeams();
render();

</script>

</body>
</html>
