<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTFA Point Table</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
min-height:100vh;
color:white;

background:
linear-gradient(rgba(0,0,0,.88),rgba(0,0,0,.95)),
url('https://images.unsplash.com/photo-1522778034537-20a2486be803?auto=format&fit=crop&w=1920&q=80');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

.header{
text-align:center;
padding:30px 10px;
}

.header h1{
font-size:42px;
font-weight:900;
letter-spacing:2px;
}

.live{
margin-top:10px;
color:#22c55e;
font-weight:700;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
50%{opacity:.4;}
}

.table-wrap{
width:90%;
margin:auto;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;

background:rgba(255,255,255,.06);
backdrop-filter:blur(15px);

border-radius:20px;
overflow:hidden;
}

th{
background:rgba(34,197,94,.25);
padding:16px;
font-size:15px;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.08);
}

tr:hover{
background:rgba(34,197,94,.08);
}

.first{
background:rgba(255,215,0,.12);
}

.second{
background:rgba(192,192,192,.08);
}

.third{
background:rgba(205,127,50,.08);
}

.back{
display:block;
text-align:center;
margin:30px;
text-decoration:none;
color:white;
opacity:.7;
}

.back:hover{
opacity:1;
}

</style>
</head>

<body>

<div class="header">

<h1>🏆 DTFA POINT TABLE</h1>

<div class="live">
🔴 LIVE DATA FROM GOOGLE SHEETS
</div>

</div>

<div class="table-wrap">

<table id="table">

<tr>
<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GD</th>
<th>PTS</th>
</tr>

</table>

</div>

<a href="visit.html" class="back">⬅ Back</a>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwcDYRcBWcXLw18jE1C-MxTFC8sugYeJGjLvJDyB8HW6JQwd5sOutcEUAqR27LosIiF/exec";

async function loadTable(){

try{

const res = await fetch(API);
const data = await res.json();

data.sort((a,b)=>{

if(b.PTS !== a.PTS)
return b.PTS-a.PTS;

return b.GD-a.GD;

});

let html=`

<tr>
<th>Pos</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GD</th>
<th>PTS</th>
</tr>

`;

data.forEach((t,index)=>{

let cls="";

if(index===0) cls="first";
if(index===1) cls="second";
if(index===2) cls="third";

let pos=index+1;

if(index===0) pos="🥇";
if(index===1) pos="🥈";
if(index===2) pos="🥉";

html+=`

<tr class="${cls}">
<td>${pos}</td>
<td>${t.team}</td>
<td>${t.P}</td>
<td>${t.W}</td>
<td>${t.D}</td>
<td>${t.L}</td>
<td>${t.GD}</td>
<td><b>${t.PTS}</b></td>
</tr>

`;

});

document.getElementById("table").innerHTML=html;

}
catch(err){

console.log(err);

}

}

loadTable();

setInterval(loadTable,10000);

</script>

</body>
</html>
